<div class="product-table w-full px-40">
    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>รหัสสินค้า (36 หลัก)</th>
                <th class="w-px">View</th>
                <th class="w-px px-2">Delete</th>
            </tr>
        </thead>
        <tbody>
            @for (product of products() ?? []; track product.id; let i = $index){
            <tr>
                <td class="text-center">{{product.id}}</td>
                <td class="pl-2">{{product.product_code}}</td>
                <td class="text-center px-2"><button class="bg-green-400 hover:bg-green-500 text-white px-6 py-1 rounded-md" (click)="openQR(product.product_code)">QR</button></td>
                <td class="text-center px-2"><button class="bg-red-400 hover:bg-red-500 text-white px-6 py-1 rounded-md" (click)="openDelConfirm(i)">ลบ</button></td>
            </tr>
            }
        </tbody>
    </table>
</div>
